apiVersion: v1
kind: Pod
metadata:
  name: nodeaffinitypod
  labels:
    app: affinitypod
spec:
  containers:
    - name: affinity
      image: nginx
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: size
                operator: In
                values:
                  - size